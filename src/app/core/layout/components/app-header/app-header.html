<nav class="nav" aria-label="Main navigation">
  <div class="container nav__wrapper flex items-center justify-between gap-6">
    <!-- BRAND -->
    <a routerLink="/" class="nav__brand"> Angular </a>

    <!-- SEARCH -->
    <form class="search" role="search">
      <mat-icon class="search__icon">search</mat-icon>

      <input
        type="search"
        class="search__input"
        placeholder="Search tasks..."
        aria-label="Search tasks"
        autocomplete="off"
      />
    </form>

    <!-- NAVIGATION -->
    <ul class="nav__menu flex items-center gap-4">
      @for (item of navItems(); track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: !!item.exact }"
            class="nav__link"
          >
            {{ item.label }}
          </a>
        </li>
      }
    </ul>

    <!-- ACTIONS -->
    <div class="nav__actions flex items-center gap-2">
      <button type="button" class="icon-button">
        <mat-icon>notifications</mat-icon>
      </button>

      <button type="button" class="icon-button">
        <mat-icon>account_circle</mat-icon>
      </button>
    </div>
  </div>
</nav>
